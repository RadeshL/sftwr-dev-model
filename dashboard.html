
<!DOCTYPE html>
<html>
<head>
    <title>Food Ordering Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #34495e;
        }

        /* Main content */
        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .header {
            background-color: white;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Cards */
        .cards {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: white;
            padding: 20px;
            flex: 1;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Admin</h2>
        <a href="#">Dashboard</a>
        <a href="#">Orders</a>
        <a href="#">Restaurants</a>
        <a href="#">Delivery</a>
        <a href="#">Reports</a>
    </div>

    <!-- Main Content -->
    <div class="main">
        
        <div class="header">
            <h2>Food Ordering System Dashboard</h2>
        </div>

        <!-- Cards -->
        <div class="cards">
            <div class="card">
                <h3>Total Orders</h3>
                <p>120</p>
            </div>
            <div class="card">
                <h3>Active Deliveries</h3>
                <p>35</p>
            </div>
            <div class="card">
                <h3>Restaurants</h3>
                <p>50</p>
            </div>
        </div>

        <!-- Table -->
        <table>
            <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Status</th>
                <th>Amount</th>
            </tr>
            <tr>
                <td>#101</td>
                <td>John</td>
                <td>Delivered</td>
                <td>₹250</td>
            </tr>
            <tr>
                <td>#102</td>
                <td>Priya</td>
                <td>Pending</td>
                <td>₹180</td>
            </tr>
        </table>

    </div>

</body>
</html>
